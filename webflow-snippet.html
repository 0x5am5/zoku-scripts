<!--
  Zoku — Webflow custom code.
  HEAD:   the tiny zoku-js flag (flash-free first paint for the hero intro).
  FOOTER: external libraries (separate, cached) + the single zoku-core bundle.
          zoku-core.js lazy-loads zoku-halftone.js on demand (only on pages
          that contain a [data-halftone] element), so the 34KB WebGL shader
          never ships to the pages that don't use it.
  Webflow pins @vX.Y.Z tags for stability; bump the tag on release.
  Note: Webflow limits applied scripts to 15 — this uses 5.
-->

<!-- Site Settings → Custom Code → Head Code -->
<script>document.documentElement.classList.add("zoku-js");</script>

<!--
  Runtime-state CSS bucket — selectors Webflow's class system can't hold
  ([open], ::before content toggles, html.zoku-js …, JS-injected overlays,
  descendant/child combinators keyed on JS state). Kept in sync with the
  Webflow Head freeform <style> block. Verified against the live DOM 2026-07-02.
-->
<style>
/* Pillars card-deck (runtime .cc-deck / .cc-pinned added by pillars.js) */
.zoku-home-pillars.cc-pinned .zoku-home-pillars_lede { position: static; }
.zoku-home-pillars_cards.cc-deck { display: block; position: relative; height: 46rem; }
.zoku-home-pillars_cards.cc-deck .zoku-home-pillars_card { position: absolute; inset: 0; margin: 0; }
@media (max-width: 991px) { .zoku-home-pillars_cards.cc-deck { height: 36rem; } }
@media (max-width: 767px) { .zoku-home-pillars_cards.cc-deck { height: 28rem; } }

/* Load-animation pre-hide (gated on html.zoku-js — set by the inline head script) */
.zoku-js .zoku-home-hero_headline [data-hero-line],
.zoku-js .zoku-home-hero_headline [data-hero-cta] { opacity: 0; transform: translateY(28px); }
.zoku-js .zoku-home-pillars_lede { opacity: 0; }

@media (prefers-reduced-motion: reduce) {
  .zoku-js .zoku-home-hero_headline [data-hero-line],
  .zoku-js .zoku-home-hero_headline [data-hero-cta] { opacity: 1; transform: none; }
  .zoku-js .zoku-home-pillars_lede { opacity: 1; }
}

/* Menu drawer runtime state — Designer can't express [open]; must live here */
html:not(.zoku-menu-ready) .zoku-menu,
html:not(.zoku-menu-ready) .zoku-menu .zoku-menu_scrim,
html:not(.zoku-menu-ready) .zoku-menu .zoku-menu_panel {
  transition: none !important;
}

.zoku-menu[open] {
  visibility: visible;
  pointer-events: auto;
  transition: visibility 0s linear 0s;
}

.zoku-menu[open] .zoku-menu_scrim {
  opacity: 1;
  transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}

.zoku-menu[open] .zoku-menu_panel {
  transform: translateX(0);
  transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}

@media (prefers-reduced-motion: reduce) {
  .zoku-menu,
  .zoku-menu[open],
  .zoku-menu_scrim,
  .zoku-menu[open] .zoku-menu_scrim,
  .zoku-menu_panel,
  .zoku-menu[open] .zoku-menu_panel {
    transition: none;
  }
}

/* Home portfolio accordion — Webflow imports the rows as <div>s (no native
   <details> collapse + no [open]-driven pseudo toggles), so these runtime-state
   rules must live here. portfolio.js toggles the [open] attribute. */
.zoku-portfolio-item:not([open]) > .zoku-portfolio-item_body { display: none; }
.zoku-portfolio-item:not([open]) .zoku-portfolio-item_indicator::before { content: "+"; }
.zoku-portfolio-item[open] .zoku-portfolio-item_indicator::before { content: "\2212"; }

/* List filter (filter.js) — the Portfolio "Product" and Resources "Category"
   listings. filter.js toggles .cc-filtered-out on the collection items whose
   category doesn't match the active [data-filter] button; this JS-state class
   isn't something Webflow's Designer can express, so its collapse lives here. */
.cc-filtered-out { display: none !important; }

/* Hide the raw halftone source image until the WebGL canvas paints,
  so the still image / raw sprite sheet doesn't flash on load.
  .no-halftone is added by the shader when WebGL2 is unavailable. */
[data-halftone] > img { visibility: hidden; }
[data-halftone].no-halftone > img { visibility: visible; }

/* Page transition — Barba.js injects .zoku-band (with .zoku-band_px children)
   into <body>; Designer can't express the JS-injected overlay, so its runtime
   CSS lives here. Without it the band renders position:static/height:0 (invisible). */
.zoku-band { position: fixed; inset: 0; z-index: 10000; display: none; pointer-events: none; }
.zoku-band_px { background: #161616; will-change: opacity; }

/* Adaptive nav — reacts to nav-theme.js toggling .cc-light over light surfaces.
   Webflow can't hold this JS-state selector or the source's custom-property
   cascade, so the light-mode flip is recreated here. */
.zoku-nav.cc-light .zoku-nav_logo svg { fill: #161616; }

.zoku-nav.cc-light .zoku-nav_menu {
  color: #161616;
  -webkit-text-fill-color: #161616;      /* .w-button renders text via this */
  border-color: rgba(22, 22, 22, 0.25);
  background-color: rgba(235, 235, 235, 0.45);
}
.zoku-nav.cc-light .zoku-nav_menu:hover {
  border-color: rgba(22, 22, 22, 0.55);
  background-color: rgba(235, 235, 235, 0.7);
}

/* The "shadow" — baked dark on .zoku-nav_scrim as background-image, so override
   background-image (not the `background` shorthand). */
.zoku-nav.cc-light .zoku-nav_scrim {
  background-image: linear-gradient(to bottom,
    rgba(235,235,235,.82) 0%, rgba(235,235,235,.48) 45%, rgba(235,235,235,0) 100%);
}

/* Testimonials Rail — Light variant cascade. The Webflow component's Light
   variant emits a data attribute on the rail root
   (data-wf--testimonials-rail--variant="light"), NOT a .cc-light combo — and
   the cards (+ eyebrow / heading / edge fade) are styled via descendant
   selectors Webflow's per-element class system can't hold, and a card instance
   can't be given a light combo conditionally. So the light flip must cascade
   from the variant attribute here. Mirrors the static
   `.cc-light .zoku-testimonial-card` rules in styles.css. */
[data-wf--testimonials-rail--variant="light"] .zoku-testimonial-card {
  background-image:
    linear-gradient(176deg, rgba(255,255,255,0.66) 6%, rgba(255,255,255,0.03) 99%),
    linear-gradient(90deg, #ebebeb, #ebebeb);
  border-color: rgba(22, 22, 22, 0.18);
  color: #575757;
}
[data-wf--testimonials-rail--variant="light"] .zoku-testimonial-card_logo {
  background: #161616;
  border-color: #575757;
}
[data-wf--testimonials-rail--variant="light"] .zoku-testimonial-card_quote,
[data-wf--testimonials-rail--variant="light"] .zoku-testimonial-card_role {
  color: #575757;
}
[data-wf--testimonials-rail--variant="light"] .zoku-testimonial-card_name {
  color: #7c00e9;
}

/* Rail chrome (also descendant / pseudo — can't be Designer classes) */
[data-wf--testimonials-rail--variant="light"] .zoku-testimonials-rail_eyebrow { color: #575757; }
[data-wf--testimonials-rail--variant="light"] .zoku-testimonials-rail_heading { color: #161616; }
/* The visible edge fade is the _viewport::after pseudo (the _track also has one
   underneath). Flip both. !important + background-image (not the `background`
   shorthand): the base dark fade is a head-CSS pseudo rule that outweighs a
   plain override — same pattern as the nav scrim above. */
[data-wf--testimonials-rail--variant="light"] .zoku-testimonials-rail_viewport::after,
[data-wf--testimonials-rail--variant="light"] .zoku-testimonials-rail_track::after {
  background-image: linear-gradient(90deg, rgba(235,235,235,0) 0%, #ebebeb 100%) !important;
}
</style>

<!-- Site Settings → Custom Code → Footer Code -->
<!-- All five defer: they parse without blocking; defer preserves execution order,
     so what matters is order (libraries before zoku-core), not download timing. -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/ScrollTrigger.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/smooothy@0.0.35/dist/smooothy.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@barba/core@2.10.3/dist/barba.umd.js" defer></script>
<script src="https://cdn.jsdelivr.net/gh/0x5am5/zoku-scripts@v1.3.0/zoku-core.js" defer></script>
