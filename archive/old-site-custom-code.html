<script>
document.addEventListener("DOMContentLoaded", () => {
  const mm = window.matchMedia("(min-width: 767px)");
  const windows = gsap.utils.toArray(".window");
  const draggables = [];

  function rebuildDraggables() {
    draggables.forEach(d => d.kill());
    draggables.length = 0;
    if (!mm.matches) return;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    windows.forEach(win => {
      const header = win.querySelector(".window__header");
      if (!header) return;

      const { left, top, right, bottom } = win.getBoundingClientRect();

      const draggable = Draggable.create(win, {
        trigger: header,
        type: "x,y",
        inertia: true,
        throwResistance: 900,
        minDuration: 0.35,
        maxDuration: 1,
        bounds: {
          minX: -left,
          minY: -top,
          maxX: vw - right,
          maxY: vh - bottom,
        },
      })[0];

      draggable.applyBounds();
      draggable.update(true);
      draggables.push(draggable);
    });
  }

  if (mm.matches) rebuildDraggables();
  mm.addEventListener("change", rebuildDraggables);

  let resizeT;
  window.addEventListener("resize", () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(rebuildDraggables, 150);
  });

  function getDistance(track, view) {
    const trackW = track.scrollWidth;
    const viewW = view.offsetWidth || window.innerWidth;
    return Math.max(0, trackW - viewW);
  }

  function setTrackHeights() {
    gsap.utils.toArray(".content__view-main").forEach(view => {
      const track = view.querySelector(".content__track");
      if (!track) return;
      view.style.height = track.scrollWidth + "px";
    });
    ScrollTrigger.refresh();
  }

  window.addEventListener("load", setTrackHeights);

  let resizeScrollT;
  window.addEventListener("resize", () => {
    clearTimeout(resizeScrollT);
    resizeScrollT = setTimeout(setTrackHeights, 150);
  });

  gsap.utils.toArray(".content__view-main").forEach(view => {
    const track = view.querySelector(".content__track");
    if (!track) return;

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: view,
        start: "top top",
        end: () => "+=" + getDistance(track, view),
        scrub: 1,
        pin: true,
        anticipatePin: 1,
        invalidateOnRefresh: true,
      },
    });

    tl.fromTo(track, { x: 0 }, { x: () => -getDistance(track, view), ease: "none" });
  });
});

</script>
